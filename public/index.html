<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111315" />
    <meta name="description" content="A shared photo station controlled like music playback." />
    <meta property="og:title" content="Phonefriends" />
    <meta property="og:description" content="Every friend is a track. Your photo is the cover." />
    <meta property="og:image" content="/share-card.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Phonefriends" />
    <title>Phonefriends</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=17" />
  </head>
  <body>
    <section class="screen is-active" id="nameScreen" aria-labelledby="nameTitle">
      <main class="entry-panel">
        <h1 id="nameTitle">phonefriends</h1>
        <form class="name-form" id="nameForm">
          <div class="text-field">
            <input id="nameInput" name="name" autocomplete="nickname" autocapitalize="words" maxlength="28" placeholder="Your name" aria-label="Your name" autofocus />
          </div>
          <button class="primary-button" id="nameNext" type="submit" disabled>Join</button>
        </form>
      </main>
    </section>

    <section class="screen app-screen" id="createScreen" aria-labelledby="createTitle">
      <header class="lock-header">
        <div class="current-post-preview" id="currentPostPreview" hidden>
          <img id="currentPostThumb" alt="" />
          <span id="currentPostStatus"></span>
        </div>
        <h1 id="createTitle">phonefriends</h1>
        <button class="debug-button" id="debugButton" type="button" hidden>debug</button>
      </header>

      <main class="composer" aria-live="polite">
        <div class="cover" id="captureCover">
          <video id="cameraPreview" autoplay playsinline muted></video>
          <img id="capturedPreview" alt="" hidden />
          <canvas id="captureCanvas" hidden></canvas>
        </div>

        <section class="glass-player" aria-label="Create status">
          <div class="status-copy">
            <input id="captionInput" maxlength="80" placeholder="type your status..." aria-label="Status" />
            <div class="display-name" id="displayNameLabel">you</div>
          </div>

          <div class="creation-controls">
            <button class="glass-icon-button" id="photoButton" type="button" aria-label="Choose photo" title="Choose photo">

            </button>
            <button class="capture-action" id="captureButton" type="button" aria-label="Capture" title="Capture">
              <span></span>
            </button>
            <button class="send-action" id="postButton" type="button" aria-label="Send status" title="Send status" hidden disabled>
              <svg class="line-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5"/><path d="m6 11 6-6 6 6"/></svg>
            </button>
            <button class="glass-icon-button" id="flipCameraButton" type="button" aria-label="Flip camera" title="Flip camera">
              <svg class="symbol-icon flip-icon" viewBox="0 0 26 26" aria-hidden="true"><path d="M4.17898 11.4585C3.55319 11.4585 3.40319 11.9259 3.7405 12.3911L5.54382 14.8934C5.80846 15.2665 6.22565 15.2585 6.48405 14.8934L8.28561 12.3831C8.61315 11.9259 8.4569 11.4585 7.84088 11.4585H4.17898ZM12.9969 6.75282C14.7208 6.75282 16.2801 7.46845 17.3887 8.60537C17.8467 9.02861 18.2962 8.9501 18.5889 8.69151C18.935 8.38233 19.0339 7.80245 18.5917 7.37472C17.1762 5.92705 15.1981 5.02588 12.9969 5.02588C8.59851 5.02588 5.03093 8.58545 5.02292 13.0114C5.03093 13.4804 5.41745 13.8669 5.88639 13.8669C6.36334 13.8669 6.75787 13.4724 6.75787 13.0034C6.75787 9.54736 9.5444 6.75282 12.9969 6.75282ZM21.8229 14.5413C22.4407 14.5413 22.5987 14.0739 22.2614 13.6087L20.4581 11.1063C20.1934 10.7333 19.7762 10.7413 19.5178 11.1063L17.7163 13.6167C17.3887 14.0739 17.537 14.5413 18.153 14.5413H21.8229ZM12.9969 19.247C11.2731 19.247 9.72174 18.5314 8.61314 17.3944C8.15513 16.9712 7.70572 17.0497 7.40494 17.3083C7.06686 17.6175 6.96002 18.1974 7.41021 18.6251C8.81764 20.0728 10.8038 20.9739 12.9969 20.9739C17.4034 20.9739 20.971 17.4144 20.979 12.9884C20.971 12.5194 20.5844 12.1329 20.1155 12.1329C19.6385 12.1329 19.244 12.5274 19.244 12.9964C19.244 16.4525 16.4495 19.247 12.9969 19.247Z"/></svg>
            </button>
            <button class="glass-icon-button" id="retakeButton" type="button" aria-label="Undo" title="Undo" hidden disabled>
              <svg class="symbol-icon undo-icon" viewBox="0 0 26 26" aria-hidden="true"><path d="M5.45703 10.8759C5.45703 11.1294 5.56074 11.382 5.7541 11.5673L10.107 15.8384C10.2932 16.0166 10.5494 16.1283 10.7852 16.1283C11.3348 16.1283 11.6937 15.7463 11.6937 15.2169C11.6937 14.9414 11.5955 14.7339 11.4209 14.5691L9.5826 12.7841L7.25839 10.8742L9.5826 8.95972L11.4209 7.181C11.5955 7.00815 11.6937 6.80874 11.6937 6.53315C11.6937 6.00385 11.3348 5.62183 10.7852 5.62183C10.5494 5.62183 10.2932 5.73354 10.107 5.91167L5.7541 10.1845C5.56074 10.3699 5.45703 10.6224 5.45703 10.8759ZM11.9977 19.4478C11.9977 19.9601 12.3822 20.3847 12.9461 20.3847H14.6166C18.1539 20.3847 20.1816 18.322 20.1816 15.2009C20.1816 12.0894 18.1058 9.93902 14.4965 9.93902H10.0746L7.21073 10.0828C6.77206 10.1058 6.41757 10.4373 6.41757 10.8759C6.41757 11.3146 6.77206 11.646 7.21073 11.6691L10.0746 11.8128H14.5621C17.0273 11.8128 18.3334 13.1804 18.3334 15.1208C18.3334 17.0613 17.0273 18.5109 14.5621 18.5109H12.9461C12.3822 18.5109 11.9977 18.9355 11.9977 19.4478Z"/></svg>
            </button>
          </div>
        </section>

        <button class="friends-button" id="friendsButton" type="button" aria-label="Share with 0 friends">
          <span>To 0 Friends</span>
        </button>
        <input id="photoInput" type="file" accept="image/*" hidden />
        <p class="status-line" id="createStatus" role="status"></p>
        <p class="status-line station-status" id="stationStatus" role="status"></p>
      </main>
    </section>

    <div class="debug-backdrop" id="debugPanel" hidden>
      <section class="debug-sheet" role="dialog" aria-modal="true" aria-labelledby="debugTitle">
        <div class="debug-sheet-header">
          <h2 id="debugTitle">live albums</h2>
          <button class="debug-close" id="closeDebugButton" type="button">close</button>
        </div>
        <div class="debug-list" id="debugList"></div>
      </section>
    </div>

    <script src="/app.js?v=19" defer></script>
  </body>
</html>
