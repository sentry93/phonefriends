services:
  - type: web
    name: phonefriends-station
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    domains:
      - phonefriends.app
    disk:
      name: station-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
